services:
  - type: web
    name: smartair-api
    runtime: python
    repo: https://github.com/AlexisBidjebele237/SmartAir-Cameroun
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENV
        value: production
